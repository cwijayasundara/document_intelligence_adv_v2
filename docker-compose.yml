services:
  postgres:
    image: postgres:16-alpine
    container_name: doc_intel_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: doc_intel
      POSTGRES_USER: doc_intel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doc_intel_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  phoenix:
    # Arize Phoenix — local OTel trace viewer for live debugging.
    # Evals themselves are written to LangSmith; Phoenix is for ad-hoc span
    # inspection during development.
    image: arizephoenix/phoenix:latest
    container_name: doc_intel_phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"  # UI
      - "4317:4317"  # OTLP gRPC (not used; kept for parity)
    environment:
      PHOENIX_WORKING_DIR: /phoenix
    volumes:
      - phoenix_data:/phoenix

  weaviate:
    image: semitechnologies/weaviate:1.30.0
    container_name: doc_intel_weaviate
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: "text2vec-openai"
      ENABLE_MODULES: "text2vec-openai"
      # Default to empty so `docker compose up -d postgres` doesn't warn when
      # only the database is being started. Set OPENAI_API_KEY in the root
      # .env (or export it) to actually use weaviate's embedding module.
      OPENAI_APIKEY: ${OPENAI_API_KEY:-}
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  weaviate_data:
  phoenix_data:
